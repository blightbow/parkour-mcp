name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # gh release create + asset upload
  id-token: write    # PyPI trusted publisher + MCP Registry OIDC

# One release run per tag. A tag delivered as two push events (GitHub
# double-dispatch, or a manual re-push) would otherwise spawn racing
# runs that collide on the PyPI upload and `gh release create`.
# cancel-in-progress is false: never interrupt an in-flight release —
# a late duplicate queues and then fails fast on the duplicate upload
# rather than risking a half-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git-cliff walks the full commit history and tag graph to
          # assemble release notes; checkout's default depth-1 shallow
          # fetch starves it. 0 = full history plus all tags.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: uv python install 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          # A clean vX.Y.Z tag is a final release; anything else (rc0,
          # a1, b2, ...) is a pre-release and must not be published as
          # GitHub's "Latest". PEP 440 RC tags carry no `-`, so a
          # SemVer-style dash check would miss them.
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches pyproject and version files are in sync
        # The tag's numeric suffix must match pyproject.toml. sync_versions.py
        # then verifies that manifest.json (strict SemVer, translated from
        # PEP 440) and server.json (PEP 440 verbatim) agree with pyproject.
        # Drift here means a hand-edit slipped past the local `just tag` gate.
        run: |
          pkg=$(uv run python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${{ steps.version.outputs.version }}" != "$pkg" ]; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} does not match pyproject.toml version $pkg"
            exit 1
          fi
          uv run python3 scripts/sync_versions.py --check

      - name: Run tests
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publisher, no token needed.
        # Configure at: https://pypi.org/manage/account/publishing/

      - name: Pack mcpb bundle
        # Bundles are shipped unsigned. mcpb 2.1.2 has two stacked bugs:
        # - #21: `mcpb verify` always reports "unsigned" (node-forge p7.verify is unimplemented)
        # - #194: signed bundles fail Claude Desktop's strict ZIP parser (EOCD comment_length not patched)
        # Community norm is unsigned + the standard "unsigned extension" warning.
        # Revisit when Anthropic publishes a fix that includes both #195 and #204.
        run: npx --yes @anthropic-ai/mcpb pack . dist/parkour-mcp.mcpb

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate release notes from commits
        # git-cliff is the single source of truth for changelog content
        # (both local CHANGELOG.md assembly during /release and this CI
        # step). It reads the [tool.git-cliff] config in pyproject.toml,
        # extracts `Why:` trailers via the Tera template, and emits a
        # Keep a Changelog section. --strip all removes the header /
        # footer so the output feeds `gh release create --notes-file`.
        #
        # The range is anchored to the last FINAL tag, not --current /
        # --latest: those cut at the adjacent git tag, so a release
        # published after intervening rcN pre-release tags would report
        # only the rc-period commits. Selecting the most recent vX.Y.Z
        # ancestor makes both an RC and the final it precedes report the
        # whole body of work since the previous final release.
        run: |
          tag="${{ steps.version.outputs.tag }}"
          last_final=$(git tag --list 'v*' --merged "$tag" --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -vFx "$tag" | head -1)
          git cliff "${last_final}..${tag}" --strip all -o release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }} \
            dist/parkour-mcp.mcpb

      - name: Install mcp-publisher
        run: |
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -sSfL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_${arch}.tar.gz" \
            | tar -xz mcp-publisher
          chmod +x mcp-publisher

      - name: Render server.json with mcpb asset coordinates
        # server.json already has the correct version (sync_versions.py
        # wrote it during the release commit). Only the mcpb-specific
        # fields (download URL + sha256) need to be updated here because
        # they can't be known until after the bundle is packed.
        run: |
          sha256=$(sha256sum dist/parkour-mcp.mcpb | cut -d' ' -f1)
          url="https://github.com/blightbow/parkour-mcp/releases/download/${{ steps.version.outputs.tag }}/parkour-mcp.mcpb"
          uv run python3 scripts/render_server_json.py --identifier "$url" --sha256 "$sha256"
          cat server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
