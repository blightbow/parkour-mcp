[project]
name = "claude-web-tools"
version = "0.2.0"
description = "MCP server providing web browsing and content extraction tools for Claude"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]",
    "kagiapi",
    "beautifulsoup4",
    "httpx",
    "playwright",
    "markdownify",
]

[project.scripts]
claude-web-tools = "claude_web_tools:main"

[tool.uv]
package = true

[tool.pytest.ini_options]
asyncio_mode = "strict"
markers = [
    "live: live integration tests hitting real endpoints (deselected by default, run with -m live)",
]
addopts = "-m 'not live'"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "respx>=0.22.0",
]
